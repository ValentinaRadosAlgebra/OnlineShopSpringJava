version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: webshop-postgres
    environment:
      POSTGRES_DB: onlineshop
      POSTGRES_USER: onlineshop_user
      POSTGRES_PASSWORD: onlineshop_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data: