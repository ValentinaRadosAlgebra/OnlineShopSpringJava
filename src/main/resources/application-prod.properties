spring.application.name=OnlineShop
spring.profiles.active=prod
server.port=${PORT:8088}

spring.datasource.url=jdbc:postgresql://localhost:5432/onlineshop
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.sql.init.mode=never
#spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.forward-headers-strategy=framework

paypal.client-id=${PAYPAL_CLIENT_ID}
paypal.client-secret=${PAYPAL_CLIENT_SECRET}
paypal.mode=sandbox

paypal.success-url=https://localhost:8088/mvc/paypal/success
paypal.cancel-url=https://localhost:8088/mvc/paypal/cancel

onlineshop.secret=${APP_SECRET}