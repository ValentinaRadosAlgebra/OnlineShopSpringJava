spring.application.name=OnlineShop

server.port = 8088

spring.datasource.url=jdbc:postgresql://localhost:5432/onlineshop
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=never
#spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.forward-headers-strategy=framework

paypal.client-id=${PAYPAL_CLIENT_ID}
paypal.client-secret=${PAYPAL_CLIENT_SECRET}
paypal.mode=sandbox

paypal.success-url=http://localhost:8088/mvc/paypal/success
paypal.cancel-url=http://localhost:8088/mvc/paypal/cancel

onlineshop.secret=${APP_SECRET}