<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

    <head>
        <title>Login History</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
              integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    </head>
    <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <a class="navbar-brand ml-3" th:href="@{/mvc/home}">
            Online Shop
        </a>
        <button class="navbar-toggler"
                type="button"
                data-toggle="collapse"
                data-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/mvc/home}">
                        Home
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/mvc/cart}">
                        Cart
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('USER')">
                    <a class="nav-link" th:href="@{/mvc/orders}">
                        My Orders
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/mvc/admin}">
                        Admin
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/mvc/admin/orders}">
                        Orders
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/mvc/admin/logins}">
                        Login History
                    </a>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item" sec:authorize="isAnonymous()">
                    <a class="btn btn-outline-light"
                       th:href="@{/mvc/auth/login}">
                        Login
                    </a>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <form th:action="@{/mvc/auth/logout}" method="post">
                        <button class="btn btn-outline-danger">Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </nav>

        <div class="container mt-4">
            <h2 class="mb-4">
                Login History
            </h2>
            <table class="table table-bordered table-striped">
                <thead class="thead-dark">
                <tr>
                    <th>Username</th>
                    <th>Login Time</th>
                    <th>IP Address</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="log : ${logs}">
                    <td th:text="${log.username}"></td>
                    <td th:text="${#temporals.format(log.loginTime,'dd.MM.yyyy HH:mm:ss')}"></td>
                    <td th:text="${log.ipAddress}"></td>
                </tr>
                </tbody>
            </table>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"
                integrity="sha256-Hg830HNmYZawhI/X2A1SUmjVrfR+oexFljLwW7+OH1Q=" crossorigin="anonymous"
                ></script>
        <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"
                integrity="sha256-nkP8cj5xaTdWK/BsZl+57ZCE/Y/i4UNtbNTpgH+6Taw=" crossorigin="anonymous"
                ></script>
        <script>
            let stompClient = null;

            function connect() {
                const socket = new SockJS('/ws');
                stompClient = Stomp.over(socket);

                stompClient.connect({}, function () {

                    stompClient.subscribe('/topic/login-history', function (message) {

                        const log = JSON.parse(message.body);

                        addRow(log);
                    });
                });
            }

            function addRow(log) {
                const table = document.querySelector("tbody");

                const row = document.createElement("tr");
                row.innerHTML = `
                <td>${log.username}</td>
                <td>${formatDate(log.loginTime)}</td>
                <td>${log.ipAddress}</td>
            `;
                table.prepend(row);
            }

            function formatDate(dateStr) {
                const date = new Date(dateStr);
                return date.toLocaleString();
            }

            connect();
        </script>
    </body>
</html>
