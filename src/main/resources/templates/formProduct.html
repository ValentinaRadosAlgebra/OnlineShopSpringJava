<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Product Form</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>

<div class="container mt-5">

    <h2 th:text="${productDTO.id == null} ? 'Add Product' : 'Edit Product'">Product</h2>

    <!-- for add product -->
    <form th:if="${productDTO.id == null}"
          th:object="${productDTO}"
          th:action="@{/mvc/admin/products/new}"
          method="post">

        <div class="form-group">
            <label for="prodcatname2">Name</label>

            <input id="prodcatname2"
                    type="text"
                   class="form-control"
                   th:field="*{name}">

            <div class="text-danger"
                 th:if="${#fields.hasErrors('name')}"
                 th:errors="*{name}">
            </div>
        </div>

        <div class="form-group">
            <label for="prodcatdesc2">Description</label>

            <textarea id="prodcatdesc2"
                    class="form-control"
                      th:field="*{description}"></textarea>

            <div class="text-danger"
                 th:if="${#fields.hasErrors('description')}"
                 th:errors="*{description}">
            </div>
        </div>

        <div class="form-group">
            <label for="prodcatprice2">Price</label>

            <input  id="prodcatprice2"
                    type="number"
                   step="0.01"
                   class="form-control"
                   th:field="*{price}">

            <div class="text-danger"
                 th:if="${#fields.hasErrors('price')}"
                 th:errors="*{price}">
            </div>
        </div>

        <div class="form-group">
            <label for="prodquan2">Quantity</label>

            <input  id="prodquan2"
                    type="number"
                   class="form-control"
                   th:field="*{quantity}">

            <div class="text-danger"
                 th:if="${#fields.hasErrors('quantity')}"
                 th:errors="*{quantity}">
            </div>
        </div>

        <div class="form-group">
            <label for="prodcatid2">Category</label>

            <select id="prodcatid2"
                    class="form-control"
                    th:field="*{categoryId}">

                <option value="">Select Category</option>

                <option th:each="category : ${categories}"
                        th:value="${category.id}"
                        th:text="${category.name}">
                </option>
            </select>

            <div class="text-danger"
                 th:if="${#fields.hasErrors('categoryId')}"
                 th:errors="*{categoryId}">
            </div>
        </div>

        <button type="submit" class="btn btn-success">
            Save
        </button>

        <a th:href="@{/mvc/admin}" class="btn btn-secondary">
            Cancel
        </a>

    </form>

    <!-- for edit -->
    <form th:if="${productDTO.id != null}"
          th:object="${productDTO}"
          th:action="@{/mvc/admin/products/edit}"
          method="post">

        <input type="hidden" th:field="*{id}">

        <div class="form-group">
            <label for="prodcatname">Name</label>

            <input id="prodcatname"
                    type="text"
                   class="form-control"
                   th:field="*{name}">

            <div class="text-danger"
                 th:if="${#fields.hasErrors('name')}"
                 th:errors="*{name}">
            </div>
        </div>

        <div class="form-group">
            <label for="prodcatdesc">Description</label>

            <textarea id="prodcatdesc"
                    class="form-control"
                      th:field="*{description}"
                      rows="3"></textarea>

            <div class="text-danger"
                 th:if="${#fields.hasErrors('description')}"
                 th:errors="*{description}">
            </div>
        </div>

        <div class="form-group">
            <label for="prodcatprice">Price</label>

            <input id="prodcatprice"
                    type="number"
                   step="0.01"
                   class="form-control"
                   th:field="*{price}">

            <div class="text-danger"
                 th:if="${#fields.hasErrors('price')}"
                 th:errors="*{price}">
            </div>
        </div>

        <div class="form-group">
            <label for="prodqunt">Quantity</label>

            <input id="prodqunt"
                   type="number"
                   class="form-control"
                   th:field="*{quantity}">

            <div class="text-danger"
                 th:if="${#fields.hasErrors('quantity')}"
                 th:errors="*{quantity}">
            </div>
        </div>

        <div class="form-group">
            <label for="prodcatid">Category</label>

            <select id="prodcatid"
                    class="form-control"
                    th:field="*{categoryId}">

                <option value="">Select Category</option>

                <option th:each="category : ${categories}"
                        th:value="${category.id}"
                        th:text="${category.name}">
                </option>

            </select>

            <div class="text-danger"
                 th:if="${#fields.hasErrors('categoryId')}"
                 th:errors="*{categoryId}">
            </div>
        </div>

        <button type="submit" class="btn btn-success">
            Update
        </button>

        <a th:href="@{/mvc/admin}" class="btn btn-secondary">
            Cancel
        </a>

    </form>

</div>

</body>
</html>
