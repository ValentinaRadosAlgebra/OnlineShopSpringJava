<!DOCTYPE HTML>
<html lang="en"
      xmlns:th="https://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <head>
        <title>Product</title>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
              integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    </head>

    <body>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <a class="navbar-brand ml-3" th:href="@{/mvc/home}">
                Online Shop
            </a>
            <button class="navbar-toggler"
                    type="button"
                    data-toggle="collapse"
                    data-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mr-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/mvc/home}">
                            Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/mvc/cart}">
                            Cart
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('USER')">
                        <a class="nav-link" th:href="@{/mvc/orders}">
                            My Orders
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link"
                           th:href="@{/mvc/admin}">
                            Admin
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" th:href="@{/mvc/admin/orders}">
                            Orders
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" th:href="@{/mvc/admin/logins}">
                            Login History
                        </a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item" sec:authorize="isAnonymous()">
                        <a class="btn btn-outline-light" th:href="@{/mvc/auth/login}">
                            Login
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <form th:action="@{/mvc/auth/logout}" method="post">
                            <button class="btn btn-outline-danger">Logout</button>
                        </form>
                    </li>
                </ul>
            </div>
        </nav>
        <div class="container mt-5">
            <div class="card">
                <div class="card-body">
                    <h2 class="card-title"  th:text="${product.name}">Product</h2>
                    <p class="card-text" th:text="${product.description}"> </p>
                    <p class="card-text">
                        <strong>Price:</strong>
                        <span th:text="${product.price}"></span>
                    </p>
                    <p class="card-text">
                        <strong>Quantity:</strong>
                        <span th:text="${product.quantity}"></span>
                    </p>
                    <form th:action="@{/mvc/cart/add}" method="post">
                        <input type="hidden" name="productId" th:value="${product.id}" />
                        <div class="form-group">
                            <label for="prod-quant">Quantity</label>
                            <select id="prod-quant" name="quantity" class="form-control">
                                <option th:each="i : ${#numbers.sequence(1, product.quantity)}"
                                        th:value="${i}"
                                        th:text="${i}">
                                </option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-success">
                            Add to Cart
                        </button>
                    </form>
                    <a href="/mvc/home"  class="btn btn-secondary mt-3">
                        Back
                    </a>
                </div>
            </div>
        </div>

    </body>
</html>
