<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <head>
        <title>All Orders</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
              integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    </head>

    <body>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <a class="navbar-brand ml-3" th:href="@{/mvc/home}">
                Online Shop
            </a>
            <button class="navbar-toggler"
                    type="button"
                    data-toggle="collapse"
                    data-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mr-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/mvc/home}">
                            Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/mvc/cart}">
                            Cart
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('USER')">
                        <a class="nav-link" th:href="@{/mvc/orders}">
                            My Orders
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" th:href="@{/mvc/admin}">
                            Admin
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" th:href="@{/mvc/admin/orders}">
                            Orders
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" th:href="@{/mvc/admin/logins}">
                            Login History
                        </a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item" sec:authorize="isAnonymous()">
                        <a class="btn btn-outline-light"
                           th:href="@{/mvc/auth/login}">
                            Login
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <form th:action="@{/mvc/auth/logout}" method="post">
                            <button class="btn btn-outline-danger">Logout</button>
                        </form>
                    </li>
                </ul>
            </div>
        </nav>

        <div class="container mt-4">
            <h2 class="mb-4">
                Customer Orders
            </h2>
            <form method="get" th:action="@{/mvc/admin/orders}" class="form-inline mb-3">
                <label for="username" class="sr-only">Username</label>
                <input id="username"
                        type="text"
                       name="username"
                       class="form-control mr-2"
                       placeholder="Customer username"
                       th:value="${username}"/>
                <label for="from" class="mr-2">from</label>
                <input id="from"
                        type="date"
                       name="from"
                       class="form-control mr-2"
                       th:value="${from}"/>
                <label for="to" class="mr-2">To</label>
                <input id="to"
                        type="date"
                       name="to"
                       class="form-control mr-2"
                       th:value="${to}"/>

                <button class="btn btn-primary">Search</button>
                <a th:href="@{/mvc/admin/orders}" class="btn btn-secondary ml-2">
                    Reset
                </a>
            </form>
            <table class="table table-bordered table-striped">
                <thead class="thead-dark">
                <tr>
                    <th>ID</th>
                    <th>Customer</th>
                    <th>Date</th>
                    <th>Payment</th>
                    <th>Total</th>
                    <th>Items</th>
                </tr>
                </thead>
                <tbody>
                    <tr th:each="order : ${orders}">
                        <td th:text="${order.orderId}"></td>
                        <td th:text="${order.username}"></td>
                        <td th:text="${#temporals.format(order.purchaseDate,'dd.MM.yyyy HH:mm')}"></td>
                        <td th:text="${order.paymentMethod.name}"></td>
                        <td th:text="${order.totalPrice}"></td>
                        <td>
                            <ul class="mb-0">
                                <li th:each="item : ${order.items}">
                                    <span th:text="${item.productName}"></span>
                                    -
                                    <span th:text="${item.quantity}"></span>
                                    ×
                                    <span th:text="${item.price}"></span>
                                </li>
                            </ul>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </body>
</html>
