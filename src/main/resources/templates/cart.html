<!DOCTYPE html>
<html
        lang="en"
        xmlns:th="http://www.thymeleaf.org"
        xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>Shopping Cart</title>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <a class="navbar-brand ml-3" th:href="@{/mvc/home}">
        Online Shop
    </a>
    <button class="navbar-toggler"
            type="button"
            data-toggle="collapse"
            data-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav mr-auto">
            <li class="nav-item">
                <a class="nav-link" th:href="@{/mvc/home}">
                    Home
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/mvc/cart}">
                    Cart
                </a>
            </li>
            <li class="nav-item" sec:authorize="hasRole('USER')">
                <a class="nav-link" th:href="@{/mvc/orders}">
                    My Orders
                </a>
            </li>
            <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                <a class="nav-link" th:href="@{/mvc/admin}">
                    Admin
                </a>
            </li>
            <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                <a class="nav-link" th:href="@{/mvc/admin/orders}">
                    Orders
                </a>
            </li>
            <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                <a class="nav-link" th:href="@{/mvc/admin/logins}">
                    Login History
                </a>
            </li>
        </ul>
        <ul class="navbar-nav ms-auto">
            <li class="nav-item" sec:authorize="isAnonymous()">
                <a class="btn btn-outline-light"
                   th:href="@{/mvc/auth/login}">
                    Login
                </a>
            </li>
            <li class="nav-item" sec:authorize="isAuthenticated()">
                <form th:action="@{/mvc/auth/logout}" method="post">
                    <button class="btn btn-outline-danger">Logout</button>
                </form>
            </li>
        </ul>
    </div>
</nav>

<div class="container mt-5">

    <h2>Shopping Cart</h2>

    <div th:if="${#lists.isEmpty(cart.items)}">

        <div class="alert alert-info">
            Your cart is empty.
        </div>

        <a th:href="@{/mvc/home}"
           class="btn btn-primary">
            Continue Shopping
        </a>

    </div>

    <div th:unless="${#lists.isEmpty(cart.items)}">

        <table class="table table-bordered">

            <thead class="thead-dark">

            <tr>
                <th>Product</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Subtotal</th>
                <th></th>
            </tr>

            </thead>

            <tbody>

            <tr th:each="item : ${cart.items}">

                <td th:text="${item.productName}"></td>

                <td th:text="${item.price}"></td>

                <td>

                    <form th:action="@{/mvc/cart/update}"
                          method="post"
                          class="form-inline">

                        <input type="hidden"
                               name="productId"
                               th:value="${item.productId}"/>

                        <label for="prodquantity" class="sr-only">Quantity</label>

                        <input id ="prodquantity"
                                type="number"
                               class="form-control mr-2"
                               min="1"
                               name="quantity"
                               th:value="${item.quantity}"
                               style="width:80px;"/>

                        <button class="btn btn-primary btn-sm">
                            Update
                        </button>
                    </form>
                </td>

                <td th:text="${item.subtotal}"></td>
                <td>
                    <form th:action="@{/mvc/cart/remove}"
                          method="post">

                        <input type="hidden"
                               name="productId"
                               th:value="${item.productId}"/>

                        <button class="btn btn-danger btn-sm">
                            Remove
                        </button>
                    </form>
                </td>
            </tr>

            </tbody>
        </table>
        <h4 class="text-right">
            Total:
            <span th:text="${cart.totalPrice}"></span>
        </h4>
        <hr>

        <div class="row">
            <div class="col-md-6">
                <form th:action="@{/mvc/cart/checkout}" method="post">
                    <div class="form-group">
                        <label for="selectPayment">Payment Method</label>
                        <select id="selectPayment" class="form-control" name="paymentMethod">
                            <option th:each="pm : ${paymentMethods}"
                                    th:value="${pm.name}"
                                    th:text="${pm.name}">
                            </option>
                        </select>
                    </div>
                    <button class="btn btn-success">
                        Checkout
                    </button>
                </form>
            </div>

            <div class="col-md-6 d-flex justify-content-end align-items-start">
                <form th:action="@{/mvc/cart/clear}" method="post">
                    <button class="btn btn-warning mt-4">
                        Clear Cart
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
