<!DOCTYPE HTML>
<html lang="en"
      xmlns:th="https://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <head>
        <title>My Orders</title>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
              integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    </head>

    <body>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <a class="navbar-brand ml-3" th:href="@{/mvc/home}">
                Online Shop
            </a>
            <button class="navbar-toggler"
                    type="button"
                    data-toggle="collapse"
                    data-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mr-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/mvc/home}">
                            Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/mvc/cart}">
                            Cart
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('USER')">
                        <a class="nav-link" th:href="@{/mvc/orders}">
                            My Orders
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" th:href="@{/mvc/admin}">
                            Admin
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" th:href="@{/mvc/admin/orders}">
                            Orders
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" th:href="@{/mvc/admin/logins}">
                            Login History
                        </a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item" sec:authorize="isAnonymous()">
                        <a class="btn btn-outline-light"
                           th:href="@{/mvc/auth/login}">
                            Login
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <form th:action="@{/mvc/auth/logout}" method="post">
                            <button class="btn btn-outline-danger">Logout</button>
                        </form>
                    </li>
                </ul>
            </div>
        </nav>

        <div class="container mt-5">

            <h1 class="mb-4 text-center">My Orders</h1>

            <div th:if="${#lists.isEmpty(orders)}" class="alert alert-info text-center">
                You have no orders yet.
            </div>

            <table class="table table-striped" th:if="${!#lists.isEmpty(orders)}">

                <thead class="thead-dark">
                <tr>
                    <th>Order ID</th>
                    <th>Date</th>
                    <th>Payment Method</th>
                    <th>Total Price</th>
                    <th>Details</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="order : ${orders}">
                    <td th:text="${order.orderId}"></td>
                    <td th:text="${order.purchaseDate}"></td>
                    <td th:text="${order.paymentMethod.name}"></td>
                    <td th:text="${order.totalPrice}"></td>

                    <td>
                        <button class="btn btn-sm btn-primary"
                                data-toggle="modal"
                                data-target="#orderModal"
                                th:attr="data-id=${order.orderId}">
                            View
                        </button>
                    </td>
                </tr>
                </tbody>

            </table>
            <div class="modal fade" id="orderModal" tabindex="-1" role="dialog">
                <div class="modal-dialog" role="document">
                    <div class="modal-content">

                        <div class="modal-header">
                            <h5 class="modal-title">Order Details</h5>
                            <button type="button" class="close" data-dismiss="modal">
                                <span>&times;</span>
                            </button>
                        </div>

                        <div class="modal-body">
                            <p><b>Order ID:</b> <span id="m-id"></span></p>
                            <p><b>Date:</b> <span id="m-date"></span></p>
                            <p><b>Payment:</b> <span id="m-payment"></span></p>
                            <p><b>Total:</b> <span id="m-total"></span></p>
                            <hr>
                            <h6>Items:</h6>
                            <ul id="m-items"></ul>
                        </div>

                    </div>
                </div>
            </div>
            <div class="text-center mt-4">
                <a href="/mvc/home" class="btn btn-secondary">Back to Home</a>
            </div>

        </div>
        <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
        <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"
                integrity="sha256-9nt4LsWmLI/O24lTW89IzAKuBqEZ47l/4rh1+tH/NY8=" crossorigin="anonymous"
                ></script>

        <script>
            $('#orderModal').on('show.bs.modal', function (event) {

                let button = $(event.relatedTarget);
                let id = button.data('id');

                $.get("/mvc/orders/" + id, function (order) {

                    $('#m-id').text(order.orderId);
                    $('#m-date').text(order.purchaseDate);
                    $('#m-payment').text(order.paymentMethod.name);
                    $('#m-total').text(order.totalPrice);

                    let itemsHtml = "";
                    order.items.forEach(i => {
                        itemsHtml += `<li>${i.productName} x ${i.quantity} (${i.price})</li>`;
                    });

                    $('#m-items').html(itemsHtml);
                });
            });
        </script>
    </body>
</html>
