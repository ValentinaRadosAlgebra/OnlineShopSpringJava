<!DOCTYPE html>

<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <head>
        <title>Admin Panel</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
              integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    </head>
    <body>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <a class="navbar-brand ml-3" th:href="@{/mvc/home}">
                Online Shop
            </a>
            <button class="navbar-toggler"
                    type="button"
                    data-toggle="collapse"
                    data-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mr-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/mvc/home}">
                            Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/mvc/cart}">
                            Cart
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('USER')">
                        <a class="nav-link" th:href="@{/mvc/orders}">
                            My Orders
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" th:href="@{/mvc/admin}">
                            Admin
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" th:href="@{/mvc/admin/orders}">
                            Orders
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" th:href="@{/mvc/admin/logins}">
                            Login History
                        </a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item" sec:authorize="isAnonymous()">
                        <a class="btn btn-outline-light"
                           th:href="@{/mvc/auth/login}">
                            Login
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <form th:action="@{/mvc/auth/logout}" method="post">
                            <button class="btn btn-outline-danger">Logout</button>
                        </form>
                    </li>
                </ul>
            </div>
        </nav>
        <div class="container mt-4">
            <h1 class="mb-4">Admin Panel</h1>
            <div class="row">
                <div class="col-md-8">
                    <div class="d-flex justify-content-between mb-3">
                        <h3>Products</h3>
                        <a th:href="@{/mvc/admin/products/new}" class="btn btn-success">
                            Add Product
                        </a>
                    </div>
                    <table class="table table-bordered">
                        <thead>
                        <tr>
                            <th>Name</th>
                            <th>Price</th>
                            <th>Quantity</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="product : ${products}">
                            <td th:text="${product.name}"></td>
                            <td th:text="${product.price}"></td>
                            <td th:text="${product.quantity}"></td>
                            <td>
                                <a th:href="@{/mvc/admin/products/edit(id=${product.id})}"
                                   class="btn btn-warning btn-sm">
                                    Edit
                                </a>
                                <form th:action="@{/mvc/admin/products/delete}"
                                      method="post"
                                      style="display:inline">
                                    <input type="hidden" name="id"  th:value="${product.id}"/>
                                    <button class="btn btn-danger btn-sm">
                                        Delete
                                    </button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>

                </div>
                <div class="col-md-4">
                    <div class="d-flex justify-content-between mb-3">
                        <h3>Categories</h3>
                        <a th:href="@{/mvc/admin/categories/new}" class="btn btn-success">
                            Add Category
                        </a>
                    </div>
                    <table class="table table-bordered">
                        <tbody>
                        <tr th:each="category : ${categories}">
                            <th th:text="${category.name}"></th>
                            <td>
                                <a th:href="@{/mvc/admin/categories/edit(id=${category.id})}"
                                   class="btn btn-warning btn-sm">
                                    Edit
                                </a>
                                <form th:action="@{/mvc/admin/categories/delete}"
                                      method="post"
                                      style="display:inline">

                                    <input type="hidden" name="id" th:value="${category.id}"/>
                                    <button class="btn btn-danger btn-sm">
                                        Delete
                                    </button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </body>
</html>
