<!DOCTYPE HTML>
<html lang="en" xmlns:th="https://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <head>
        <title>Home</title>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
              integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    </head>
    <body>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <a class="navbar-brand ml-3" th:href="@{/mvc/home}">
                Online Shop
            </a>
            <button class="navbar-toggler"
                    type="button"
                    data-toggle="collapse"
                    data-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mr-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/mvc/home}">
                            Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/mvc/cart}">
                            Cart
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('USER')">
                        <a class="nav-link" th:href="@{/mvc/orders}">
                            My Orders
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" th:href="@{/mvc/admin}">
                            Admin
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" th:href="@{/mvc/admin/orders}">
                            Orders
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" th:href="@{/mvc/admin/logins}">
                            Login History
                        </a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item" sec:authorize="isAnonymous()">
                        <a class="btn btn-outline-light"
                           th:href="@{/mvc/auth/login}">
                            Login
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <form th:action="@{/mvc/auth/logout}" method="post">
                            <button class="btn btn-outline-danger">Logout</button>
                        </form>
                    </li>
                </ul>
            </div>
        </nav>

        <div class="container mt-5">

            <h1 class="text-center mb-4">Products</h1>
            <div class="mb-4 text-center">
                <a class="btn btn-outline-primary m-1"
                   href="/mvc/home">
                    All
                </a>

                <a th:each="cat : ${categories}"
                   th:href="@{'/mvc/home/category/' + ${cat.id}}"
                   class="btn btn-outline-secondary m-1"
                   th:text="${cat.name}">
                </a>
            </div>

            <!-- Products -->
            <div class="row">
                <div class="col-12 text-center"
                     th:if="${#lists.isEmpty(products)}">

                    <div class="alert alert-info">
                        No products under this category.
                    </div>

                </div>
                <div class="col-md-4 mb-4"
                     th:each="product : ${products}">

                    <div class="card h-100">

                        <div class="card-body">

                            <h5 class="card-title"
                                th:text="${product.name}"> Product
                            </h5>

                            <p class="card-text">
                                Price:
                                <span th:text="${product.price}"></span>
                            </p>

                            <a th:href="@{'/mvc/home/products/' + ${product.id}}"
                               class="btn btn-primary">
                                View
                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </body>
</html>
